<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 — Group Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <h1>World Cup 2026 · Group Tracker</h1>
    <nav class="tabs">
      <button class="tab active" data-tab="fixtures">Fixtures</button>
      <button class="tab" data-tab="groups">Groups</button>
      <button class="tab" data-tab="strength">Strength</button>
    </nav>
  </header>

  <section id="groups-view" hidden>
    <div class="viewbar">
      <div class="seg" id="viewseg">
        <button data-view="points" class="active">Points</button>
        <button data-view="rank">Rank</button>
      </div>
      <span class="updated" id="updated"></span>
    </div>
    <div class="group-grid" id="group-grid"></div>
  </section>

  <section id="fixtures-view">
    <div class="viewbar" style="padding-bottom: 0;">
      <div class="seg" id="fixtureseg">
        <button data-status="ALL" class="active">All</button>
        <button data-status="today">Today</button>
        <button data-status="upcoming">Upcoming</button>
        <button data-status="results">Results</button>
      </div>
      <span class="updated" id="fixtures-count"></span>
    </div>
    <div class="filter-bar" id="fixtures-filter-bar">
      <div class="filter-group">
        <label for="filter-stage">Stage</label>
        <select id="filter-stage">
          <option value="ALL">All Stages</option>
          <option value="group">Group Stage (All)</option>
          <option value="group-md1">Group Matchday 1</option>
          <option value="group-md2">Group Matchday 2</option>
          <option value="group-md3">Group Matchday 3</option>
          <option value="round of 32">Round of 32</option>
          <option value="round of 16">Round of 16</option>
          <option value="quarter-finals">Quarter-finals</option>
          <option value="semi-finals">Semi-finals</option>
          <option value="third-place match">Third-place match</option>
          <option value="final">Final</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Group</label>
        <div class="custom-select-container" id="group-select-container">
          <button class="custom-select-trigger" id="group-select-trigger">All Groups</button>
          <div class="custom-select-options" id="group-select-options">
            <!-- Dynamically populated -->
          </div>
        </div>
      </div>
      <div class="filter-group">
        <label>Country</label>
        <div class="custom-select-container" id="country-select-container">
          <button class="custom-select-trigger" id="country-select-trigger">All Countries</button>
          <div class="custom-select-options" id="country-select-options">
            <!-- Dynamically populated -->
          </div>
        </div>
      </div>
      <div class="filter-group">
        <label for="filter-date">Date</label>
        <select id="filter-date">
          <option value="ALL">All Dates</option>
        </select>
      </div>
      <button class="btn-reset" id="btn-reset-filters">Reset</button>
    </div>
    <div class="fixtures-list" id="fixtures-list"></div>
  </section>

  <section id="strength-view" hidden>
    <div class="viewbar">
      <div class="seg" id="strengthseg">
        <button data-metric="positions" class="active">Positions</button>
        <button data-metric="points">Points</button>
      </div>
      <span class="updated" id="strength-caption"></span>
    </div>
    <div class="strength-list" id="strength-list"></div>
  </section>

  <div class="modal" id="modal" hidden>
    <div class="modal-card" id="modal-card"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
